version: "3.4"

services:
  japanese-annotator:
    network_mode: "host"
    image: crpi-5s2sj3q8pm2yq2k6.cn-hongkong.personal.cr.aliyuncs.com/yomiya/japanese-annotator:staging
    ports:
      - "8100:8000"
    environment:
      - USER_DICT_DIR=/app/user_dict
      - APP_PORT=8000
      - UVICORN_WORKERS=2
    volumes:
      - "/etc/japanese-annotator/user_dict:/app/user_dict"
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
